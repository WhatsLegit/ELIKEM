<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - ELIKEM DOTS</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    .auth-error {
      background: rgba(220,38,38,0.08);
      border: 1px solid rgba(220,38,38,0.2);
      color: #dc2626;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 0.88rem;
      margin-bottom: 1rem;
      display: none;
    }
    .auth-success {
      background: rgba(22,163,74,0.08);
      border: 1px solid rgba(22,163,74,0.2);
      color: #16a34a;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 0.88rem;
      margin-bottom: 1rem;
      display: none;
    }
    .recovery-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 1.8rem;
      background: rgba(0,0,0,0.05);
      border-radius: 12px;
      padding: 4px;
    }
    .recovery-tabs button {
      flex: 1;
      padding: 0.6rem 1rem;
      border: none;
      background: transparent;
      border-radius: 9px;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 500;
      color: #777;
      cursor: pointer;
      transition: all 0.2s;
    }
    .recovery-tabs button.active {
      background: #fff;
      color: #111;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .code-boxes {
      display: flex;
      gap: 0.6rem;
      margin-top: 0.4rem;
    }
    .code-boxes input {
      width: 56px !important;
      height: 56px;
      text-align: center;
      font-size: 1.4rem;
      font-weight: 700;
      border-radius: 12px !important;
      padding: 0 !important;
    }
  </style>
</head>
<body>

  <!-- ── Video Background ── -->
  <div class="video-bg-wrapper">
    <video autoplay muted loop playsinline>
      <source src="images/istockphoto-1035031016-640_adpp_is.mp4" type="video/mp4">
      <source src="images/istockphoto-2150178677-640_adpp_is.mp4" type="video/mp4">
    </video>
  </div>

  <!-- ── Navbar ── -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <svg class="logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <rect x="45" y="20" width="10" height="60" rx="2" fill="#2563EB"/>
          <rect x="20" y="45" width="60" height="10" rx="2" fill="#2563EB"/>
          <circle cx="25" cy="25" r="5" fill="#16a34a"/>
          <circle cx="75" cy="25" r="5" fill="#16a34a"/>
          <circle cx="25" cy="75" r="5" fill="#16a34a"/>
          <circle cx="75" cy="75" r="5" fill="#16a34a"/>
        </svg>
        ELIKEM DOTS
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a href="signup.html">Sign Up</a></li>
      </ul>
      <!-- Mobile action icons -->
      <div class="nav-mobile-actions" id="navMobileActions">
        <a href="cart.html" class="nav-cart-btn" id="navCartBtn" aria-label="Cart">
          <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.99 1.61h9.72a2 2 0 001.99-1.61L23 6H6"/></svg>
          <span class="nav-cart-badge hidden" id="navCartBadge">0</span>
        </a>
        <a href="profile.html" class="nav-avatar-btn" id="navAvatarBtn" aria-label="Profile" style="display:none;">?</a>
      </div>
      <!-- Hamburger -->
      <button class="hamburger" id="hamburgerBtn" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>
  <div class="mobile-nav" id="mobileNav">
    <button class="mobile-nav-close" id="mobileNavClose">✕</button>
    <a href="index.html">Home</a>
    <a href="shop.html">Pharmacy</a>
    <a href="services.html">Wound Care</a>
    <a href="cart.html">Cart</a>
    <a href="login.html">Login</a>
    <a href="signup.html" class="mobile-nav-signup">Sign Up</a>
  </div>

  <!-- ── Recovery Form ── -->
  <section class="hero">
    <video class="hero-video" autoplay muted loop playsinline>
      <source src="images/istockphoto-2150178677-640_adpp_is.mp4" type="video/mp4">
      <source src="images/istockphoto-1035031016-640_adpp_is.mp4" type="video/mp4">
    </video>
    <div class="hero-overlay"></div>

    <div class="glass" style="width:100%; max-width:440px; padding:2.5rem; border-radius:28px; z-index:2;">
      <div style="text-align:center; margin-bottom:1.8rem;">
        <div class="form-icon-header"><i data-lucide="key-round"></i></div>
        <h2 style="font-size:1.7rem; font-weight:700; color:#111;">Recover Access</h2>
        <p style="color:#777; font-size:0.9rem; margin-top:0.3rem;">Choose how you want to reset your password</p>
      </div>

      <!-- Tabs -->
      <div class="recovery-tabs">
        <button id="tabEmail" class="active" type="button">
          <i data-lucide="mail" style="width:13px;height:13px;stroke:currentColor;vertical-align:middle;margin-right:4px;"></i>
          Email Link
        </button>
        <button id="tabCode" type="button">
          <i data-lucide="shield-check" style="width:13px;height:13px;stroke:currentColor;vertical-align:middle;margin-right:4px;"></i>
          Secret Code
        </button>
      </div>

      <!-- Panel: Email reset -->
      <div id="panelEmail">
        <div id="resetError" class="auth-error"></div>
        <div id="resetSuccess" class="auth-success"></div>
        <form id="resetForm">
          <div class="form-group">
            <label>Your Email Address</label>
            <input type="email" id="resetEmail" placeholder="your@email.com" required>
          </div>
          <button type="submit" class="btn" style="width:100%; padding:1rem; margin:0;">
            Send Reset Link
          </button>
        </form>
      </div>

      <!-- Panel: Secret code recovery -->
      <div id="panelCode" style="display:none;">
        <div id="codeError" class="auth-error"></div>
        <div id="codeSuccess" class="auth-success"></div>
        <form id="secretCodeForm">
          <div class="form-group">
            <label>Your Email Address</label>
            <input type="email" id="recoveryEmail" placeholder="your@email.com" required>
          </div>
          <div class="form-group">
            <label>Enter Your 4-Digit Secret Code</label>
            <div class="code-boxes">
              <input type="password" maxlength="1" class="recovery-digit" inputmode="numeric" pattern="[0-9]" autocomplete="off">
              <input type="password" maxlength="1" class="recovery-digit" inputmode="numeric" pattern="[0-9]" autocomplete="off">
              <input type="password" maxlength="1" class="recovery-digit" inputmode="numeric" pattern="[0-9]" autocomplete="off">
              <input type="password" maxlength="1" class="recovery-digit" inputmode="numeric" pattern="[0-9]" autocomplete="off">
            </div>
            <input type="hidden" id="recoveryCode">
          </div>
          <button type="submit" class="btn" style="width:100%; padding:1rem; margin:0;">
            Verify Code &amp; Send Reset Link
          </button>
        </form>
      </div>

      <p style="text-align:center; margin-top:1.5rem; color:#777; font-size:0.88rem;">
        <a href="login.html" style="color:#2563EB; font-weight:600;">← Back to Login</a>
      </p>
    </div>
  </section>

  <script type="module">
    import './js/ui.js';
    import './js/auth.js';

    // ── Recovery code digit boxes ──
    const digits = document.querySelectorAll('.recovery-digit');
    const hidden = document.getElementById('recoveryCode');

    function syncCode() {
      hidden.value = Array.from(digits).map(d => d.value).join('');
    }

    digits.forEach((input, i) => {
      input.addEventListener('input', () => {
        input.value = input.value.replace(/\D/g, '').slice(0, 1);
        syncCode();
        if (input.value && i < digits.length - 1) digits[i + 1].focus();
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && i > 0) digits[i - 1].focus();
      });
      input.addEventListener('paste', (e) => {
        e.preventDefault();
        const pasted = (e.clipboardData.getData('text') || '').replace(/\D/g, '').slice(0, 4);
        pasted.split('').forEach((ch, j) => { if (digits[j]) digits[j].value = ch; });
        syncCode();
        digits[Math.min(pasted.length, digits.length - 1)].focus();
      });
    });
  </script>
  <script>lucide.createIcons();</script>

</body>
</html>
