<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ELIKEM DOTS</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

  <!-- ── Global Video Background ── -->
  <div class="video-bg-wrapper">
    <video autoplay muted loop playsinline>
      <source src="images/istockphoto-1035031016-640_adpp_is.mp4" type="video/mp4">
      <source src="images/istockphoto-2150178677-640_adpp_is.mp4" type="video/mp4">
    </video>
  </div>

  <!-- ── Navbar ── -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <svg class="logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <rect x="45" y="20" width="10" height="60" rx="2" fill="#2563EB"/>
          <rect x="20" y="45" width="60" height="10" rx="2" fill="#2563EB"/>
          <circle cx="25" cy="25" r="5" fill="#16a34a"/>
          <circle cx="75" cy="25" r="5" fill="#16a34a"/>
          <circle cx="25" cy="75" r="5" fill="#16a34a"/>
          <circle cx="75" cy="75" r="5" fill="#16a34a"/>
        </svg>
        ELIKEM DOTS
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Pharmacy</a></li>
        <li><a href="signup.html">Sign Up</a></li>
      </ul>
      <!-- Mobile action icons -->
      <div class="nav-mobile-actions" id="navMobileActions">
        <a href="cart.html" class="nav-cart-btn" id="navCartBtn" aria-label="Cart">
          <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.99 1.61h9.72a2 2 0 001.99-1.61L23 6H6"/></svg>
          <span class="nav-cart-badge hidden" id="navCartBadge">0</span>
        </a>
        <a href="profile.html" class="nav-avatar-btn" id="navAvatarBtn" aria-label="Profile" style="display:none;">?</a>
      </div>
      <!-- Hamburger -->
      <button class="hamburger" id="hamburgerBtn" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>
  <div class="mobile-nav" id="mobileNav">
    <button class="mobile-nav-close" id="mobileNavClose">✕</button>
    <a href="index.html">Home</a>
    <a href="shop.html">Pharmacy</a>
    <a href="services.html">Wound Care</a>
    <a href="cart.html">Cart</a>
    <a href="login.html">Login</a>
    <a href="signup.html" class="mobile-nav-signup">Sign Up</a>
  </div>

  <!-- ── Login Form ── -->
  <section class="hero">
    <video class="hero-video" autoplay muted loop playsinline>
      <source src="images/istockphoto-2150178677-640_adpp_is.mp4" type="video/mp4">
      <source src="images/istockphoto-1035031016-640_adpp_is.mp4" type="video/mp4">
    </video>
    <div class="hero-overlay"></div>

    <form id="loginForm" class="glass" style="width:100%; max-width:420px; padding:3rem; border-radius:28px; z-index:2;">
      <div style="text-align:center; margin-bottom:2rem;">
        <div class="form-icon-header"><i data-lucide="lock-keyhole"></i></div>
        <h2 style="font-size:1.8rem; font-weight:700; color:#111;">Welcome Back</h2>
        <p style="color:#777; font-size:0.95rem;">Sign in to your account</p>
      </div>
      <div id="loginError" style="background:rgba(220,38,38,0.08);border:1px solid rgba(220,38,38,0.2);color:#dc2626;padding:0.75rem 1rem;border-radius:10px;font-size:0.88rem;margin-bottom:1rem;display:none;"></div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="your@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Your password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn" style="width:100%; padding:1.1rem; margin:0;">Login</button>
      <p style="text-align:center; margin-top:1.5rem; color:#777; font-size:0.9rem;">
        <a href="signup.html" style="color:#2563EB; font-weight:600;">Create Account</a>
        &nbsp;·&nbsp;
        <a href="forgot-password.html" style="color:#111; font-weight:600;">Forgot Password?</a>
      </p>
      <p style="text-align:center; margin-top:1rem; padding-top:1rem; border-top:1px solid rgba(0,0,0,0.08); font-size:0.82rem; color:#bbb;">
        Admin? <a href="admin-login.html" style="color:#999; font-weight:500;">Admin login →</a>
      </p>
    </form>
  </section>

  <script type="module">
    import './js/ui.js';
    import './js/auth.js';
  </script>
  <script>lucide.createIcons();</script>

</body>
</html>
